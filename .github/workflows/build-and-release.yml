name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sherpa-kws-builder
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar
          build-args: |
            BUILDKIT_PROGRESS=plain

      - name: Upload build image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

      - name: Load Docker image
        run: |
          docker load --input /tmp/image.tar
          docker tag $(docker images -q sherpa-kws-builder) ghcr.io/${{ github.repository_owner }}/sherpa-kws-builder:latest

      - name: Create output directory
        run: mkdir -p output

      - name: Run container to pack and extract artifacts
        run: |
          docker run --rm \
            -v $(pwd)/output:/host-output \
            ghcr.io/${{ github.repository_owner }}/sherpa-kws-builder:latest

      - name: List output files
        run: ls -lh output/

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            output/sherpa_kws_demo
            output/*.so*
            output/x-tools.tar.gz
            output/onnxruntime.tar.gz
            output/sherpa-onnx.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
